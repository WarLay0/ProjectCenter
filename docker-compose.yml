services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - database_data:/var/lib/postgresql/data

  backend:
    build: ./app/backend
    depends_on:
      - database
    environment:
      APP_ENV: dev
      DATABASE_URL: "postgresql://app:app@database:5432/app?serverVersion=16&charset=utf8"
    volumes:
      - ./app/backend:/var/www/backend

  webserver:
    image: nginx:alpine
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./app/backend:/var/www/backend:ro
      - ./app/backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build: ./app/frontend
    ports:
      - "4200:4200"
    volumes:
      - ./app/frontend:/app
      - /app/node_modules

volumes:
  database_data:
