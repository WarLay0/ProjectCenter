<section class="project-detail-page">
  <div class="project-hero">
    <div>
      <h1>{{ project.name }}</h1>
      <p>{{ project.description }}</p>
    </div>

    <div class="project-progress">
      <span>Avancement</span>
      <strong>{{ project.progress }}%</strong>
    </div>
  </div>

  <div class="sprints-list">
    <article class="sprint-card" *ngFor="let sprint of sprints">
      <div class="sprint-card__header">
        <h2>{{ sprint.name }}</h2>
        <button>Ajouter une tâche</button>
      </div>

      <div class="tasks-list">
        <div class="task-row" *ngFor="let task of sprint.tasks">
          <div>
            <h3>{{ task.name }}</h3>
          </div>

          <span class="status-badge" [ngClass]="task.status">
            {{ task.status }}
          </span>
        </div>
      </div>
    </article>
  </div>
</section>
